# ================================
# PRODUCTION DOCKER COMPOSE OVERLAY
# ================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This file overrides development settings for production deployment

version: '3.8'

services:
  # MongoDB - Remove exposed port for security
  mongodb:
    ports: []  # Remove public port exposure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    restart: always

  # AI Service - No public port, only internal network
  ai-service:
    ports: []  # Remove public port, access via nginx
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
    restart: always

  # Backend API - No public port, only internal network
  backend:
    ports: []  # Remove public port, access via nginx
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    restart: always

  # Frontend - No public port, access via nginx
  frontend:
    build:
      context: ./project/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_AI_SERVICE_URL=/ai
    ports: []  # Remove public port, access via nginx
    restart: always

  # Nginx Reverse Proxy - Single entry point
  nginx:
    image: nginx:alpine
    container_name: fashionai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro  # For SSL certificates
    networks:
      - fashionai-network
    depends_on:
      - frontend
      - backend
      - ai-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
